plugins {
    id 'fabric-loom' version '1.1-SNAPSHOT'
}

repositories {
    maven {
        url 'https://maven.fabricmc.net/'
    }
    mavenCentral()
}

dependencies {
    // Define your dependencies for Minecraft 1.21.1
    minecraft 'com.mojang:minecraft:1.21.1'
    mappings 'net.fabricmc:fabric-loom:1.1-SNAPSHOT' 
}

java { 
    toolchains { 
        languageVersion = JavaLanguageVersion.of(17)
    }
}